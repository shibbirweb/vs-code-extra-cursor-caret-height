name: Publish Extension

# Publishes to the VS Code Marketplace (and Open VSX, if configured) whenever a
# GitHub Release is published. Create the release from the master branch after
# bumping the version in package.json to match the release tag.
on:
  release:
    types: [published]

permissions:
  contents: write # upload the .vsix as a release asset

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version matches release tag
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${TAG#v}"
          echo "package.json=$PKG_VERSION  release=$TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION). Bump the version before releasing."
            exit 1
          fi

      - name: Lint
        run: pnpm run lint

      - name: Package VSIX
        run: pnpm exec vsce package --no-dependencies -o "extra-cursor-caret-height-${TAG}.vsix"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --no-dependencies --packagePath "extra-cursor-caret-height-${TAG}.vsix"

      - name: Ensure Open VSX namespace
        if: ${{ env.OVSX_PAT != '' }}
        # First publish for a publisher requires the namespace to exist; ignore
        # the error on later runs when it already does.
        run: pnpm exec ovsx create-namespace shibbirweb -p "$OVSX_PAT" || true

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: pnpm exec ovsx publish "extra-cursor-caret-height-${TAG}.vsix" -p "$OVSX_PAT"

      - name: Attach VSIX to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" "extra-cursor-caret-height-${TAG}.vsix" --clobber
